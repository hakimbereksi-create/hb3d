<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>HB3D STL 3D Viewer - Impressions 3D Lille</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/bootstrap-theme.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Main div -->
    <div id="div" class="container">
        
        <div class="row">
            <div class="col-md-4">
                <!-- STL Selector -->
                <div id="stlselector" class="bg-warning">
                    <label for="file"><b>Votre fichier STL:</b></label>
                    <input type="file" name="file" id="file"/>
                </div>

                <!-- 3D Viewer -->
                <div id="view3d">
                    <canvas id="cv" width="400" height="400"></canvas>
                    <div class="panel panel-info" id="tip">
                        <table class="table">
                            <tr><td>Zoom</td><td><kbd>Wheel</kbd></td></tr>
                            <tr><td>Rotate</td><td><kbd>Drag</kbd></td></tr>
                            <tr><td>Pan</td><td><kbd>Ctrl+Drag</kbd></td></tr>
                        </table>
                    </div>
                    <div id="loading">
                        <img src="css/images/loading.gif" alt="Loading..."/>
                    </div>
                </div>

                <!-- Render controls -->
                <table class="table">
                    <tr>
                        <td><button class="btn btn-default btn-xs pull-left" id="info">
                            <span class="glyphicon glyphicon-info-sign"></span> Interact
                        </button></td>
                        <td>
                            <div class="btn-group dropup pull-right">
                                <button class="btn btn-default btn-xs dropdown-toggle" data-toggle="dropdown">
                                    <span class="glyphicon glyphicon-eye-open"></span> View <span class="caret"></span>
                                </button>
                                <ul class="dropdown-menu">
                                    <li><a href="#wireframe" class="rendermode">Wireframe</a></li>
                                    <li><a href="#point" class="rendermode">Points</a></li>
                                    <li><a href="#flat" class="rendermode">Filled</a></li>
                                </ul>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>

            <div class="col-md-4">
                <!-- HB3D Devis Form -->
                <div class="list-group container-fluid">
                    <form id="form">
                        
                        <!-- Matériaux Plastique -->
                        <div class="list-group-item">
                            <h4>🖨️ Matériau Plastique</h4>
                            <label class="radio-inline"><input type="radio" name="material" value="ABS"> ABS</label>
                            <label class="radio-inline"><input type="radio" name="material" value="PLA"> PLA</label>
                            <label class="radio-inline"><input type="radio" name="material" value="NYLON"> NYLON</label>
                            <label class="radio-inline"><input type="radio" name="material" value="PETG"> PETG</label>
                            <label class="radio-inline"><input type="radio" name="material" value="Flex"> Flex</label>
                        </div>

                        <!-- Quantité -->
                        <div class="list-group-item">
                            <h4>📦 Quantité (kg)</h4>
                            <input name="qty" type="number" class="form-control" min="0.1" step="0.1" value="1" placeholder="1.0">
                        </div>

                        <!-- Couleur -->
                        <div class="list-group-item">
                            <h4>🎨 Couleur</h4>
                            <label class="radio-inline"><input type="radio" name="color" value="Blanc"> Blanc</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Noir"> Noir</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Gris"> Gris</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Rouge"> Rouge</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Vert"> Vert</label>
                            <label class="radio-inline"><input type="radio" name="color" value="Bleu"> Bleu</label>
                        </div>

                        <!-- Résine -->
                        <div class="list-group-item">
                            <h4>🌊 Résine</h4>
                            <label class="radio-inline"><input type="radio" name="resine" value="Standard"> Standard</label>
                            <label class="radio-inline"><input type="radio" name="resine" value="Flexible"> Flexible</label>
                            <label class="radio-inline"><input type="radio" name="resine" value="Clear"> Translucide</label>
                        </div>

                        <!-- Note -->
                        <div class="list-group-item">
                            <h4>📝 Demande spéciale</h4>
                            <textarea name="note" class="form-control" rows="3" maxlength="200" placeholder="Délai urgent, finition mate..."></textarea>
                        </div>

                        <!-- Email -->
                        <div class="list-group-item list-group-item-info">
                            <h4>📧 Votre email</h4>
                            <input name="email" type="email" class="form-control" required placeholder="contact@exemple.com">
                        </div>

                        <!-- Bouton Devis -->
                        <button id="submit" type="submit" class="btn btn-primary btn-block list-group-item">
                            <h3>🚀 Obtenir un devis <span class="glyphicon glyphicon-cloud-download pull-right"></span></h3>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- JS Libraries -->
    <script src="

        <!-- JS Libraries -->
    <script src="js/jquery-1.11.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
    <script src="js/jsc3d_mod.js"></script>
    <script src="js/jsc3d.console.js"></script>
    <script src="js/object_viewer.js"></script>
    <script src="js/upload_handler.js"></script>

    <!-- 🔥 HB3D EMAILJS (TES 3 IDs ICI) -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        // REMPLACE TES 3 IDs EmailJS
        emailjs.init("TES_PUBLIC_KEY"); // ← Account → Public Key
        
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                material: document.querySelector('input[name="material"]:checked')?.value || 'Non spécifié',
                qty: document.querySelector('input[name="qty"]').value + " kg",
                color: document.querySelector('input[name="color"]:checked')?.value || 'Non spécifié',
                resine: document.querySelector('input[name="resine"]:checked')?.value || 'Non spécifié',
                email: document.querySelector('input[name="email"]').value,
                note: document.querySelector('textarea[name="note"]').value
            };
            
            emailjs.send("SERVICE_ID", "TEMPLATE_ID", formData).then(function() {
                alert('✅ Devis HB3D envoyé ! Réponse 24h Lille');
                document.getElementById('form').reset();
            }, function(error) {
                alert('❌ Erreur : ' + error.text);
            });
        });
    </script>

</body>
</html>
